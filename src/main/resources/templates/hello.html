<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World | Atlas Grove</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/brand.css}">
</head>
<body>
    <header class="brand-header">
        <div class="brand-shell">
            <a class="brand-logo" th:href="@{/}">Atlas Grove</a>
        </div>
    </header>

    <main class="brand-main">
        <section class="hero">
            <p class="hero-kicker">Minimal Spring Boot View</p>
            <h1 th:text="${message}">Hello, World!</h1>
            <p>The project now keeps only a single Atlas Grove page and the Spring Boot essentials needed to render it.</p>
        </section>
    </main>

    <footer class="brand-footer">
        <div class="brand-shell">
            <p>Atlas Grove</p>
        </div>
    </footer>
</body>
</html>
